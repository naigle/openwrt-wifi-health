name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="wifi-health-dashboard_${VERSION}-r0_all"

          mkdir -p staging/www/cgi-bin staging/www/wifi-health

          install -m 755 src/wifi-health  staging/www/cgi-bin/wifi-health
          install -m 644 src/index.html   staging/www/wifi-health/index.html

          INSTALLED_SIZE=$(du -sb staging/www | awk '{print $1}')
          BUILDDATE=$(date +%s)

          cat > staging/.PKGINFO << EOF
          pkgname = wifi-health-dashboard
          pkgver = ${VERSION}-r0
          arch = all
          size = ${INSTALLED_SIZE}
          pkgdesc = Real-time Wi-Fi health dashboard for OpenWrt routers
          url = https://github.com/${GITHUB_REPOSITORY}
          builddate = ${BUILDDATE}
          packager = Matt Bird
          depend = iw
          depend = uhttpd
          EOF

          cat > staging/.post-install << 'SCRIPT'
          #!/bin/sh
          grep -qF '/www/wifi-health/index.html' /etc/sysupgrade.conf 2>/dev/null || echo '/www/wifi-health/index.html' >> /etc/sysupgrade.conf
          grep -qF '/www/cgi-bin/wifi-health'    /etc/sysupgrade.conf 2>/dev/null || echo '/www/cgi-bin/wifi-health'    >> /etc/sysupgrade.conf
          SCRIPT

          cat > staging/.pre-deinstall << 'SCRIPT'
          #!/bin/sh
          sed -i '\|/www/wifi-health/index.html|d' /etc/sysupgrade.conf 2>/dev/null
          sed -i '\|/www/cgi-bin/wifi-health|d'    /etc/sysupgrade.conf 2>/dev/null
          SCRIPT

          chmod 755 staging/.post-install staging/.pre-deinstall

          tar -czf "${PKG}.apk" \
            --owner=0 --group=0 \
            -C staging \
            .PKGINFO \
            .post-install \
            .pre-deinstall \
            ./www

          echo "APK_FILE=${PKG}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}"  >> $GITHUB_ENV

      - name: Regenerate install.sh with embedded files
        run: |
          CGI_B64=$(base64 -w0 src/wifi-health)
          HTML_B64=$(base64 -w0 src/index.html)

          head -n $(grep -n '^CGI_B64=' install.sh | cut -d: -f1 | head -1) install.sh | head -n -1 > install.sh.new || cp install.sh install.sh.new
          printf 'CGI_B64="%s"\n'  "$CGI_B64"  >> install.sh.new
          printf 'HTML_B64="%s"\n' "$HTML_B64" >> install.sh.new
          tail -n +$(( $(grep -n '^HTML_B64=' install.sh | cut -d: -f1 | head -1) + 1 )) install.sh >> install.sh.new
          mv install.sh.new install.sh
          chmod +x install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APK_FILE }}
            install.sh
          body: |
            ## Wi-Fi Health Dashboard v${{ env.VERSION }}

            ### Install options

            **Option 1 — install.sh (recommended, works on any OpenWrt router):**
            Replace `192.168.1.1` with your router's actual IP address.
            ```sh
            curl -sL https://github.com/${{ github.repository }}/releases/latest/download/install.sh \
              -o install.sh && chmod +x install.sh && ./install.sh root@192.168.1.1
            ```

            **Option 2 — apk package (OpenWrt 24.10+):**
            ```sh
            curl -sLO https://github.com/${{ github.repository }}/releases/latest/download/${{ env.APK_FILE }}
            apk add --allow-untrusted ${{ env.APK_FILE }}
            ```

            Dashboard available at **http://192.168.1.1/wifi-health/** after install.

            ### Requirements
            - OpenWrt 24.10+ (apk); 23.05 supported via install.sh
            - `iw` and `uhttpd` (both installed by default on most builds)
